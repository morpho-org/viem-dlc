on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version: "24"

      - name: Install dependencies
        run: pnpm install

      - name: Lint and format
        run: pnpm exec biome check .

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:unit

  npm-release:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Read local package version
        id: read-local-version
        run: |
          echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Read published package version
        id: read-published-version
        run: |
          PKG_NAME=$(jq -r .name package.json)
          version=$(pnpm view $PKG_NAME version --registry https://npm.pkg.github.com 2>/dev/null || echo "")
          echo "version=$version" >> $GITHUB_OUTPUT
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install, pack, and publish
        if: ${{ steps.read-local-version.outputs.version != steps.read-published-version.outputs.version }}
        id: publish
        run: |
          pnpm install
          tarball=$(pnpm pack --out package.tgz | tail -n 1)
          pnpm config set //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          pnpm publish $tarball
          echo "tarball=$tarball" >> $GITHUB_OUTPUT
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: ${{ steps.read-local-version.outputs.version != steps.read-published-version.outputs.version }}
        with:
          target_commitish: ${{ github.sha }}
          tag_name: v${{ steps.read-local-version.outputs.version }}
          make_latest: true
          generate_release_notes: true
          files: |
            ${{ steps.publish.outputs.tarball }}
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
